<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メールアドレスバリエーション生成ツール</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
      background: #f8f8f8;
      color: #222;
    }
    h1 {
      color: #2980b9;
    }
    input[type="text"] {
      width: 320px;
      padding: 0.5em;
      font-size: 1.1em;
    }
    button {
      padding: 0.5em 1.5em;
      font-size: 1.1em;
      margin-left: 1em;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background: #3498db;
    }
    #result {
      margin-top: 2em;
      background: #fff;
      border-radius: 5px;
      padding: 1.5em;
      box-shadow: 0 2px 8px #ddd;
    }
    .download-link {
      display: inline-block;
      margin-top: 1em;
      color: #2980b9;
      text-decoration: underline;
      cursor: pointer;
    }
    .note {
      font-size: 0.95em;
      color: #888;
    }
    label {
      margin-left: 1em;
      font-size: 0.96em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>メールアドレスバリエーション生成ツール</h1>
  <p>
    メールアドレスを入力してください（例: example@gmail.com）<br>
    <span class="note">
      ※「.」や「+」を使ったバリエーションはGmailでのみ有効です。他のサービスでは正しく動作しない場合があります。<br>
      ※「@gmail.com」の場合は「@googlemail.com」もバリエーションに含めます。
    </span>
  </p>
  <input type="text" id="emailInput" placeholder="メールアドレス">
  <input type="checkbox" id="strictMode" checked>
  <label for="strictMode">Gmail仕様（「.」や「+」を展開）を使う</label>
  <button id="generateBtn">バリエーション生成</button>
  <div id="result"></div>
  <script>
    // ドットバリエーション生成
    function generateDotVariations(local) {
      const results = new Set();
      function helper(prefix, rest) {
        if (rest.length === 0) {
          results.add(prefix);
          return;
        }
        helper(prefix + rest[0], rest.slice(1));
        if (prefix.length > 0) {
          helper(prefix + '.' + rest[0], rest.slice(1));
        }
      }
      helper(local[0], local.slice(1));
      return Array.from(results);
    }
    // プラスバリエーション生成
    function generatePlusVariations(local, plusStrings = ["test", "alias", "sample"]) {
      const plusVariations = plusStrings.map(str => local + '+' + str);
      return [local, ...plusVariations];
    }

    // Gmail仕様のバリエーション生成（@gmail.com/@googlemail.com両対応）
    function generateAllGmailVariations(email) {
      // メールアドレスを分割
      const m = email.match(/^([a-zA-Z0-9_.+-]+)@([a-zA-Z0-9.-]+\.[a-zA-Z]{2,})$/);
      if (!m) return { error: "メールアドレスの形式が正しくありません" };
      const local = m[1];
      let domain = m[2].toLowerCase();
      const plusStrings = ["test", "alias", "sample"];
      const all = new Set();

      // ドットバリエーション
      const dotVars = generateDotVariations(local);

      // Gmailの場合、@googlemail.comも加算
      let domains = [domain];
      if (domain === "gmail.com") {
        domains.push("googlemail.com");
      }
      for (const dotVar of dotVars) {
        const plusVars = generatePlusVariations(dotVar, plusStrings);
        for (const v of plusVars) {
          for (const d of domains) {
            all.add(v + "@" + d);
          }
        }
      }
      return { variations: Array.from(all).sort(), count: all.size };
    }

    // 通常のバリエーション（なし/エイリアスのみ、@googlemail.comは考慮しない）
    function generateSimpleVariations(email) {
      const m = email.match(/^([a-zA-Z0-9_.+-]+)@([a-zA-Z0-9.-]+\.[a-zA-Z]{2,})$/);
      if (!m) return { error: "メールアドレスの形式が正しくありません" };
      const local = m[1];
      const domain = m[2];
      const plusStrings = ["test", "alias", "sample"];
      const all = new Set();
      all.add(local + "@" + domain);
      for (const s of plusStrings) {
        all.add(local + "+" + s + "@" + domain);
      }
      return { variations: Array.from(all).sort(), count: all.size };
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const email = document.getElementById('emailInput').value.trim();
      const resultDiv = document.getElementById('result');
      const strictMode = document.getElementById('strictMode').checked;
      resultDiv.innerHTML = '';
      if (!email) return;
      let ret;
      if (strictMode) {
        ret = generateAllGmailVariations(email);
      } else {
        ret = generateSimpleVariations(email);
      }
      const { variations, count, error } = ret;
      if (error) {
        resultDiv.innerHTML = `<span style="color:red">${error}</span>`;
        return;
      }
      resultDiv.innerHTML = `<b>生成バリエーション数：</b> ${count}<br><br>`;
      resultDiv.innerHTML += '<details><summary>バリエーション一覧（クリックで展開）</summary><div style="max-height: 300px;overflow:auto;"><pre>' +
        variations.join('\n') +
        '</pre></div></details>';
      // ダウンロードリンク
      const blob = new Blob([variations.join('\n')], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      resultDiv.innerHTML += `<a class="download-link" href="${url}" download="variations.txt">バリエーション一覧をダウンロード</a>`;
      if (!strictMode) {
        resultDiv.innerHTML += `<div class="note">※「.」によるバリエーション展開はGmail仕様のみです。他サービスでは利用できません。</div>`;
      }
    });
  </script>
</body>
</html>
